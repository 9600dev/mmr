# MMR Configuration
# User configs live in ~/.config/mmr/ (copied from bundled configs on first run)
# Environment variables override these values (uppercase param name)

root_directory: .
config_file: ~/.config/mmr/trader.yaml
pycron_config_file: ~/.config/mmr/pycron.yaml
strategy_config_file: ~/.config/mmr/strategy_runtime.yaml
logfile: ~/.local/share/mmr/logs/trader.log
strategies_directory: strategies

# Trading mode: 'paper' or 'live'
# This selects which account and port are used.
trading_mode: paper

# Interactive Brokers connection
# Set both accounts — trading_mode picks the active one.
# IB_ACCOUNT env var overrides the auto-selected account.
# IB_SERVER_PORT env var overrides the auto-selected port.
ib_server_address: 127.0.0.1
ib_paper_account: ''
ib_live_account: ''
ib_paper_port: 7497
ib_live_port: 7496
trading_runtime_ib_client_id: 5
strategy_runtime_ib_client_id: 7

# DuckDB storage
# All persistent data lives in ~/.local/share/mmr/ (same location for Docker and local)
# duckdb_path: trading data (events, proposals, groups, universes)
# history_duckdb_path: OHLCV bars (separate file avoids lock contention with trading services)
duckdb_path: ~/.local/share/mmr/data/mmr.duckdb
history_duckdb_path: ~/.local/share/mmr/data/mmr_history.duckdb
universe_library: 'Universes'

# Pycron process manager
pycron_server_address: 127.0.0.1
pycron_server_port: 8081

# ZeroMQ messaging
zmq_rpc_server_address: tcp://127.0.0.1
zmq_rpc_server_port: 42001
zmq_pubsub_server_address: tcp://127.0.0.1
zmq_pubsub_server_port: 42002
zmq_strategy_rpc_server_address: tcp://127.0.0.1
zmq_strategy_rpc_server_port: 42005
zmq_messagebus_server_address: tcp://127.0.0.1
zmq_messagebus_server_port: 42006
zmq_data_rpc_server_address: tcp://127.0.0.1
zmq_data_rpc_server_port: 42003

# Massive.com (formerly Polygon.io)
massive_api_key: ''
massive_feed: stocks
massive_delayed: false
