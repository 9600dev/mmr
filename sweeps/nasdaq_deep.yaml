name: nasdaq_deep
note: |
  Deep-dive sweep. Top 3 strategies from the prior 90d run (ORB,
  OpeningDriveFade, VwapReclaim) across expanded 55-symbol universe
  with 365-day 1-min windows. Goal: find edges that survive both
  a wider symbol base AND a longer horizon, before walk-forward.
  3 strats × 55 symbols × 9 params = 1485 backtests.

sweeps:
  - name: orb_deep
    strategy: strategies/opening_range_breakout.py
    class: OpeningRangeBreakout
    symbols: [AAPL, MSFT, NVDA, AMZN, META, GOOGL, GOOG, AVGO, TSLA, COST,
              NFLX, ADBE, PEP, CSCO, AMD, TMUS, CMCSA, INTC, INTU, QCOM,
              AMAT, MU, ADI, PYPL, BKNG, KLAC, LRCX, REGN, VRTX, PANW,
              MELI, ABNB, GILD, MDLZ, SNPS,
              COIN, PLTR, SHOP, CRWD, ENPH, ROKU, ZM, SNAP, RIVN, SQ,
              SPY, QQQ, IWM, DIA, XLK, XLF, XLE, XLV, XLI, XLY]
    bar_size: "1 min"
    days: 365
    param_grid:
      RANGE_MINUTES: [15, 30, 45]
      VOLUME_MULT: [1.2, 1.5, 2.0]

  - name: drive_fade_deep
    strategy: strategies/opening_drive_fade.py
    class: OpeningDriveFade
    symbols: [AAPL, MSFT, NVDA, AMZN, META, GOOGL, GOOG, AVGO, TSLA, COST,
              NFLX, ADBE, PEP, CSCO, AMD, TMUS, CMCSA, INTC, INTU, QCOM,
              AMAT, MU, ADI, PYPL, BKNG, KLAC, LRCX, REGN, VRTX, PANW,
              MELI, ABNB, GILD, MDLZ, SNPS,
              COIN, PLTR, SHOP, CRWD, ENPH, ROKU, ZM, SNAP, RIVN, SQ,
              SPY, QQQ, IWM, DIA, XLK, XLF, XLE, XLV, XLI, XLY]
    bar_size: "1 min"
    days: 365
    param_grid:
      DRIVE_WINDOW_MIN: [15, 30, 45]
      DRIVE_ATR_MULT: [1.0, 1.5, 2.0]

  - name: vwap_reclaim_deep
    strategy: strategies/vwap_reclaim.py
    class: VwapReclaim
    symbols: [AAPL, MSFT, NVDA, AMZN, META, GOOGL, GOOG, AVGO, TSLA, COST,
              NFLX, ADBE, PEP, CSCO, AMD, TMUS, CMCSA, INTC, INTU, QCOM,
              AMAT, MU, ADI, PYPL, BKNG, KLAC, LRCX, REGN, VRTX, PANW,
              MELI, ABNB, GILD, MDLZ, SNPS,
              COIN, PLTR, SHOP, CRWD, ENPH, ROKU, ZM, SNAP, RIVN, SQ,
              SPY, QQQ, IWM, DIA, XLK, XLF, XLE, XLV, XLI, XLY]
    bar_size: "1 min"
    days: 365
    param_grid:
      MIN_DIP_PCT: [0.2, 0.3, 0.5]
      VOL_MULT: [1.1, 1.3, 1.5]
