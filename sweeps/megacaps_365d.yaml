name: megacaps_365d
note: |
  Re-test the 10 mega-caps with true 365d 1-min coverage (TD wasn't
  broken — I just hadn't re-downloaded these with --days 365 after
  the original --days 90 batch). 3 strats × 10 symbols × 9 params = 270 backtests.

sweeps:
  - name: orb_megacap
    strategy: strategies/opening_range_breakout.py
    class: OpeningRangeBreakout
    symbols: [AAPL, MSFT, NVDA, AMZN, META, GOOGL, AVGO, TSLA, COST, AMD]
    bar_size: "1 min"
    days: 365
    param_grid:
      RANGE_MINUTES: [15, 30, 45]
      VOLUME_MULT: [1.2, 1.5, 2.0]

  - name: drive_fade_megacap
    strategy: strategies/opening_drive_fade.py
    class: OpeningDriveFade
    symbols: [AAPL, MSFT, NVDA, AMZN, META, GOOGL, AVGO, TSLA, COST, AMD]
    bar_size: "1 min"
    days: 365
    param_grid:
      DRIVE_WINDOW_MIN: [15, 30, 45]
      DRIVE_ATR_MULT: [1.0, 1.5, 2.0]

  - name: vwap_reclaim_megacap
    strategy: strategies/vwap_reclaim.py
    class: VwapReclaim
    symbols: [AAPL, MSFT, NVDA, AMZN, META, GOOGL, AVGO, TSLA, COST, AMD]
    bar_size: "1 min"
    days: 365
    param_grid:
      MIN_DIP_PCT: [0.2, 0.3, 0.5]
      VOL_MULT: [1.1, 1.3, 1.5]
