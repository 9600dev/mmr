# TEMPLATE — copied to ~/.config/mmr/ on first run (container.ensure_config_dir,
# start_mmr.sh, docker-entrypoint.sh). Edits here do NOT affect a running
# system. The live config lives in ~/.config/mmr/ (bind-mounted into the
# container at /home/trader/.config/mmr/). Use this file to update defaults
# that ship with the repo for fresh installs only.
version: 1
disable_existing_loggers: false

formatters:
    standard:
        format: "%(asctime)s::%(name)s::%(levelname)s::%(message)s"
    rich_standard:
        format: "[%(name)s] %(message)s"
    error:
        format: "%(asctime)s %(levelname)s <PID %(process)d:%(processName)s> %(name)s.%(funcName)s(): %(message)s"

handlers:
    console:
        class: logging.StreamHandler
        level: DEBUG
        formatter: standard
        stream: ext://sys.stdout

    rich_console:
        class: rich.logging.RichHandler
        rich_tracebacks: True
        show_path: False
        omit_repeated_times: False
        level: DEBUG
        formatter: rich_standard

    trader_service_handler:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: standard
        filename: ~/.local/share/mmr/logs/trader_service.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

    strategy_service_handler:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: standard
        filename: ~/.local/share/mmr/logs/strategy_service.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

    data_service_handler:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: standard
        filename: ~/.local/share/mmr/logs/data_service.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

    file_handler:
        class: logging.handlers.RotatingFileHandler
        level: INFO
        formatter: standard
        filename: ~/.local/share/mmr/logs/trader.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

    error_file_handler:
        class: logging.handlers.RotatingFileHandler
        level: ERROR
        formatter: error
        filename: ~/.local/share/mmr/logs/errors.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

    debug_file_handler:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: standard
        filename: /tmp/debug.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

root:
    level: NOTSET
    handlers: [rich_console, file_handler, error_file_handler, debug_file_handler]

loggers:
    urllib3:
        level: WARNING
        propagate: no
    urllib3.connectionpool:
        level: WARNING
        propagate: no
    ib_async.client:
        level: WARNING
        handlers: [rich_console, debug_file_handler]
        propagate: no
    ib_async.wrapper:
        level: WARNING
        handlers: [rich_console, debug_file_handler]
        propagate: no
    ib_async.ib:
        level: WARNING
        handlers: [rich_console, debug_file_handler]
        propagate: no
    # NOTE on `propagate: yes` (deliberate, was a silent `propogate` typo for
    # years): service loggers write their own file AND propagate to root
    # (console via rich_console, trader.log at INFO+, /tmp/debug.log at DEBUG,
    # errors.log — the last doubles with the logger's own error_file_handler,
    # accepted). Propagation is load-bearing: /tmp/debug.log stays a complete
    # single-file triage log, and pytest's caplog captures via root. The
    # monitors don't depend on it either way — they read the service files.
    data_service:
        level: DEBUG
        handlers: [data_service_handler, error_file_handler]
        propagate: yes
    ib_history:
        level: DEBUG
        handlers: [data_service_handler, error_file_handler]
        propagate: yes
    trader_service:
        level: DEBUG
        handlers: [trader_service_handler, error_file_handler]
        propagate: yes
    trading_runtime:
        level: DEBUG
        handlers: [trader_service_handler, error_file_handler]
        propagate: yes
    # ibreactivex (IBAIORx) carries the IB connectivity/farm-status lines the
    # health monitor needs — route it into the trader_service log (it used to
    # fall through to root only, leaving trader_service_<ts>.log blind to
    # connectivity events).
    ibreactivex:
        level: DEBUG
        handlers: [trader_service_handler, error_file_handler]
        propagate: yes
    strategy_service:
        level: DEBUG
        handlers: [strategy_service_handler, error_file_handler]
        propagate: yes
    strategy_runtime:
        level: DEBUG
        handlers: [strategy_service_handler, error_file_handler]
        propagate: yes
    # auto_executor's OPENED/CLOSING/CLOSED/CLOSE FAILED audit lines belong in
    # the strategy_service log next to the signals that caused them — the
    # trading monitor watches one file.
    auto_executor:
        level: DEBUG
        handlers: [strategy_service_handler, error_file_handler]
        propagate: yes
