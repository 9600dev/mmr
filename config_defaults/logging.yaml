# TEMPLATE — copied to ~/.config/mmr/ on first run (container.ensure_config_dir,
# start_mmr.sh, docker-entrypoint.sh). Edits here do NOT affect a running
# system. The live config lives in ~/.config/mmr/ (bind-mounted into the
# container at /home/trader/.config/mmr/). Use this file to update defaults
# that ship with the repo for fresh installs only.
version: 1
disable_existing_loggers: false

formatters:
    standard:
        format: "%(asctime)s::%(name)s::%(levelname)s::%(message)s"
    rich_standard:
        format: "[%(name)s] %(message)s"
    error:
        format: "%(asctime)s %(levelname)s <PID %(process)d:%(processName)s> %(name)s.%(funcName)s(): %(message)s"

handlers:
    console:
        class: logging.StreamHandler
        level: DEBUG
        formatter: standard
        stream: ext://sys.stdout

    rich_console:
        class: rich.logging.RichHandler
        rich_tracebacks: True
        show_path: False
        omit_repeated_times: False
        level: DEBUG
        formatter: rich_standard

    trader_service_handler:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: standard
        filename: ~/.local/share/mmr/logs/trader_service.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

    strategy_service_handler:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: standard
        filename: ~/.local/share/mmr/logs/strategy_service.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

    data_service_handler:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: standard
        filename: ~/.local/share/mmr/logs/data_service.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

    file_handler:
        class: logging.handlers.RotatingFileHandler
        level: INFO
        formatter: standard
        filename: ~/.local/share/mmr/logs/trader.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

    error_file_handler:
        class: logging.handlers.RotatingFileHandler
        level: ERROR
        formatter: error
        filename: ~/.local/share/mmr/logs/errors.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

    debug_file_handler:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: standard
        filename: /tmp/debug.log
        maxBytes: 10485760 # 10MB
        backupCount: 20
        encoding: utf8

root:
    level: NOTSET
    handlers: [rich_console, file_handler, error_file_handler, debug_file_handler]

loggers:
    urllib3:
        level: WARNING
        propagate: no
    urllib3.connectionpool:
        level: WARNING
        propagate: no
    ib_async.client:
        level: WARNING
        handlers: [rich_console, debug_file_handler]
        propagate: no
    ib_async.wrapper:
        level: WARNING
        handlers: [rich_console, debug_file_handler]
        propagate: no
    ib_async.ib:
        level: WARNING
        handlers: [rich_console, debug_file_handler]
        propagate: no
    data_service:
        level: DEBUG
        handlers: [data_service_handler, error_file_handler]
        propogate: no
    ib_history:
        level: DEBUG
        handlers: [data_service_handler, error_file_handler]
        propogate: no
    trader_service:
        level: DEBUG
        handlers: [trader_service_handler, error_file_handler]
        propogate: no
    trading_runtime:
        level: DEBUG
        handlers: [trader_service_handler, error_file_handler]
        propogate: no
    strategy_service:
        level: DEBUG
        handlers: [strategy_service_handler, error_file_handler]
        propogate: no
    strategy_runtime:
        level: DEBUG
        handlers: [strategy_service_handler, error_file_handler]
        propogate: no
