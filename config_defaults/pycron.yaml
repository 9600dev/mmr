# TEMPLATE — copied to ~/.config/mmr/ on first run (container.ensure_config_dir,
# start_mmr.sh, docker-entrypoint.sh). Edits here do NOT affect a running
# system. The live config lives in ~/.config/mmr/ (bind-mounted into the
# container at /home/trader/.config/mmr/). Use this file to update defaults
# that ship with the repo for fresh installs only.
root_directory: .
port: 8081
env: TRADER_CHECK=False
health_check_eval:
  - "exec('from trader.tools.trader_check import health_check') or health_check('~/.config/mmr/trader.yaml')"
jobs:
    - name: data_service
      description: historical data download service
      command: python3
      arguments: -m trader.data_service
      start: "* * * * *"
      start_on_pycron_start: True
      restart_if_found: False
      restart_if_finished: False
      delay: 5
    - name: trader_service
      description: service that abstracts over and interfaces with Interactive Brokers
      command: python3
      arguments: -m trader.trader_service
      start: "* * * * *"
      start_on_pycron_start: True
      restart_if_found: True
      restart_if_finished: True
      delay: 10
    - name: strategy_service
      description: service that loads, hosts and executes trading strategies and algorithms
      command: python3
      arguments: -m trader.strategy_service
      start: "* * * * *"
      start_on_pycron_start: True
      restart_if_found: True
      restart_if_finished: True
      depends_on:
        - trader_service
      delay: 15
    - name: web_dashboard
      description: read-only web dashboard (currencies, positions, strategies, proposals) on port 7424
      command: python3
      arguments: -m web.app
      start: "* * * * *"
      start_on_pycron_start: True
      restart_if_found: True
      restart_if_finished: True
      depends_on:
        - trader_service
      delay: 20
    # ---- declarative data refreshes (driven by data_refresh.yaml) ----
    # One-shot subprocesses on a schedule. Each cron entry calls
    # `mmr data refresh JOB [JOB ...]` with the job names declared in
    # data_refresh.yaml. Failures in one cron entry don't take down
    # pycron or the other entries.
    #
    # IMPORTANT: cron expressions are interpreted in the CONTAINER's
    # local TZ (set via docker-compose's TZ env var, which defaults to
    # America/New_York but is overridden by the TIME_ZONE variable in
    # .env). Examples below ANCHOR to NY time — if your container runs
    # in another TZ, edit ~/.config/mmr/pycron.yaml accordingly. Common
    # adjustments:
    #   - Container in PT? subtract 3 hours from the NY times below
    #   - Container in UTC? add 4 (EDT/summer) or 5 (EST/winter) hours
    - name: data_refresh_us
      description: refresh US universes (TwelveData) — after US after-hours close
      command: python3
      arguments: -m trader.mmr_cli data refresh us_top20_daily us_top20_1min
      start: "30 20 * * 1-5"     # 8:30 PM ET weekdays. TwelveData 1-min bars
                                 # include pre (4-9:30 AM) + post (16-20:00 ET);
                                 # AH closes at 20:00 so we wait 30 min for the
                                 # final bars to publish.
      start_on_pycron_start: False
      restart_if_found: False
      restart_if_finished: False
    - name: data_refresh_asx
      description: refresh ASX universes (IB) — after ASX close
      command: python3
      arguments: -m trader.mmr_cli data refresh asx_daily asx_1min
      start: "30 16 * * 0-4"     # 4:30 PM ET Sun-Thu = 6:30 AM UTC Mon-Fri =
                                 # 16:30 AEST (30 min after Sydney 16:00 close
                                 # to let the closing auction settle). ASX has
                                 # no after-hours session, so this is final.
      start_on_pycron_start: False
      restart_if_found: False
      restart_if_finished: False
    - name: db_backup
      description: clean DuckDB snapshot to the host-mounted backups/ dir
      command: python3
      arguments: -m trader.mmr_cli data backup --keep 7
      start: "17 22 * * *"       # 10:17 PM daily — after both data-refresh jobs
                                 # (ASX 16:30, US 20:30) and before the IB Gateway
                                 # nightly restart (~23:59). Snapshots survive
                                 # volume loss / rebuilds; keeps the newest 7.
      start_on_pycron_start: False
      restart_if_found: False
      restart_if_finished: False
    # ---- pre-open readiness preflights ----
    # `mmr preflight` runs the verify checks (live IB round-trip via ping_ib,
    # armed roster RUNNING, services responsive) and appends one
    # "PREFLIGHT OK|FAIL: ..." line to ~/.local/share/mmr/logs/preflight.log —
    # a hung gateway or missing roster is caught BEFORE the open instead of
    # by missing trades after it. Same TZ caveat as the refresh jobs above.
    - name: preflight_us
      description: pre-open stack readiness check ~30 min before the US open
      command: python3
      arguments: -m trader.mmr_cli preflight
      start: "0 9 * * 1-5"       # 9:00 AM ET weekdays — 30 min before the
                                 # 09:30 NYSE/NASDAQ open.
      start_on_pycron_start: False
      restart_if_found: False
      restart_if_finished: False
    - name: preflight_asx
      description: pre-open stack readiness check ~30 min before the ASX open
      command: python3
      arguments: -m trader.mmr_cli preflight
      start: "30 19 * * 0-4"     # 7:30 PM ET Sun-Thu = 09:30 AEST Mon-Fri —
                                 # 30 min before the 10:00 Sydney open.
      start_on_pycron_start: False
      restart_if_found: False
      restart_if_finished: False
