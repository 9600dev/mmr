# TEMPLATE — copied to ~/.config/mmr/ on first run (container.ensure_config_dir,
# start_mmr.sh, docker-entrypoint.sh). Edits here do NOT affect a running
# system. The live config lives in ~/.config/mmr/ (bind-mounted into the
# container at /home/trader/.config/mmr/). Use this file to update defaults
# that ship with the repo for fresh installs only.
env: TRADER_CHECK=False
strategies:
  - name: global
    description: strategy wide configuration
    universe: portfolio
    bar_size: '1 min'
    historical_days_prior: 90
    module: strategies/global.py
    class_name: Global

  # ---- Overnight sweep winners (2026-04-20) — paper ----
  # All 4 cleared the strict filter: PSR >= 0.95, sharpe-CI lower bound >= 0,
  # DD < 5%, PF >= 1.5, positive pnl skew. See LLMVM-PROGRESS.md for the
  # confidence block on each run_id.

  - name: orb_gld
    description: >-
      ORB 45/1.3 on GLD — overnight sweep run 305: +17.4%, sharpe 1.79,
      PSR 0.99, DD -3.0%, PF 3.6, 329 trades/yr.
    conids: [51529211]
    bar_size: '1 min'
    historical_days_prior: 90
    module: strategies/opening_range_breakout.py
    class_name: OpeningRangeBreakout
    params:
      RANGE_MINUTES: 45
      VOLUME_MULT: 1.3

  - name: orb_googl
