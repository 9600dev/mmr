# TEMPLATE — copied to ~/.config/mmr/ on first run (container.ensure_config_dir,
# start_mmr.sh, docker-entrypoint.sh). Edits here do NOT affect a running
# system. The live config lives in ~/.config/mmr/ (bind-mounted into the
# container at /home/trader/.config/mmr/). Use this file to update defaults
# that ship with the repo for fresh installs only.
# fires up all the services minus the docker based ones (X, vnc etc)
root_directory: .
port: 8081
env: TRADER_CHECK=False
health_check_eval:
  - "exec('from trader.tools.trader_check import health_check') or health_check('~/.config/mmr/trader.yaml')"
jobs:
    - name: data_service
      description: historical data download service
      command: python3
      arguments: -m trader.data_service
      start: "* * * * *"
      start_on_pycron_start: True
      restart_if_found: False
      restart_if_finished: False
      delay: 5
    - name: trader_service
      description: service that abstracts over and interfaces with Interactive Brokers
      command: python3
      arguments: -m trader.trader_service
      start: "* * * * *"
      start_on_pycron_start: True
      restart_if_found: True
      restart_if_finished: True
      delay: 10
    - name: strategy_service
      description: service that loads, hosts and executes trading strategies and algorithms
      command: python3
      arguments: -m trader.strategy_service
      start: "* * * * *"
      start_on_pycron_start: True
      restart_if_found: True
      restart_if_finished: True
      depends_on:
        - trader_service
      delay: 15
